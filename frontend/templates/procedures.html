{% extends 'base.html' %}
{% block title %}EHIAS - Stored Procedures{% endblock %}

{% block content %}
<h3 class="mb-4">Stored Procedures</h3>

<div class="row g-3">
  {% for name, cfg in procedures.items() %}
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-body d-flex flex-column">
        <h6 class="card-title">{{ cfg.display_name }}</h6>
        <p class="card-text text-muted small flex-grow-1">{{ cfg.description }}</p>
        <a href="{{ url_for('procedure_exec', proc_name=name) }}" class="btn btn-outline-primary btn-sm mt-2">
          {% if cfg.params %}Configure & Run{% else %}Run{% endif %}
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
